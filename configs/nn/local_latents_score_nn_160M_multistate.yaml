name: local_latents_transformer_multistate

output_parameterization:
  bb_ca: v
  local_latents: v

nlayers: 14
token_dim: 768
nheads: 12
parallel_mha_transition: False
attention_type: naive
strict_feats: False

# ORIGINAL 2026-04-12:
# feats_seq: ["xt_bb_ca", "xt_local_latents", "x_sc_bb_ca", "x_sc_local_latents", "optional_ca_coors_nm_seq_feat", "optional_res_type_seq_feat"]
# MODIFIED 2026-04-13: restore binder-side checkpoint-aligned sequence features so the
# baseline input projection can be fully reused by the multistate architecture.
feats_seq: ["xt_bb_ca", "xt_local_latents", "x_sc_bb_ca", "x_sc_local_latents", "optional_ca_coors_nm_seq_feat", "optional_res_type_seq_feat", "hotspot_mask_seq", "res_seq_pdb_idx"]
feats_cond_seq: ["time_emb_bb_ca", "time_emb_local_latents"]

dim_cond: 256
idx_emb_dim: 256
t_emb_dim: 256

# ORIGINAL 2026-04-12:
# feats_pair_repr: ["rel_seq_sep", "xt_bb_ca_pair_dists", "x_sc_bb_ca_pair_dists", "optional_ca_pair_dist"]
# MODIFIED 2026-04-13: restore binder-side checkpoint-aligned pair features for
# chain-aware and hotspot-aware projection compatibility.
feats_pair_repr: ["rel_seq_sep", "xt_bb_ca_pair_dists", "x_sc_bb_ca_pair_dists", "optional_ca_pair_dist", "chain_idx_pair", "hotspot_mask_pair"]
feats_pair_cond: ["time_emb_bb_ca", "time_emb_local_latents"]

xt_pair_dist_dim: 30
xt_pair_dist_min: 0.1
xt_pair_dist_max: 3
x_sc_pair_dist_dim: 30
x_sc_pair_dist_min: 0.1
x_sc_pair_dist_max: 3
seq_sep_dim: 127
pair_repr_dim: 256

update_pair_repr: False
update_pair_repr_every_n: 3
use_tri_mult: False
use_tri_attn: False
use_qkln: True

# Multistate target fusion
cross_state_nheads: 8
cross_state_dropout: 0.0
global_refine_layers: 2
global_refine_nheads: 8
state_role_num_embeddings: 8
